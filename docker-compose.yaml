version: '3.8'

services:
  setup:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-setup
    restart: unless-stopped
    command: setup
    volumes:
      - C:\EKE\MySync\hermes-rag-setup:/opt/data
    networks:
      - rag_net
    # Uncomment to forward specific env vars instead of using .env file:
    environment:
    #   - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    #   - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    stdin_open: true
    tty: true  # Interactive komut için gerekli
  
  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-gateway
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - C:\EKE\MySync\hermes-rag-setup:/opt/data
    networks:
      - rag_net
    depends_on:
      - setup
    # Uncomment to forward specific env vars instead of using .env file:
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 127.0.0.1 --port 9119
    ports:
      - "9119:9119"
    volumes:
      - C:\EKE\MySync\hermes-rag-setup:/opt/data
    environment:
      - GATEWAY_HEALTH_URL=http://0.0.0.0:8642
    networks:
      - rag_net
    depends_on:
      - setup
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

networks:
  rag_net:
    driver: bridge