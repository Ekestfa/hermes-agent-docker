version: "3.8"

services:
  setup:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-setup
    command: setup
    volumes:
      - C:\EKE\MySync\hermes-rag-setup:/opt/data
    networks:
      - rag_net
    stdin_open: true
    tty: true

  gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-gateway
    restart: unless-stopped
    command: hermes gateway run
    ports:
      - "8642:8642"
    volumes:
      - C:\EKE\MySync\hermes-rag-setup:/opt/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
    networks:
      - rag_net

  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 127.0.0.1 --port 9119
    ports:
      - "9119:9119"
    volumes:
      - C:\EKE\MySync\hermes-rag-setup:/opt/data
    environment:
      - GATEWAY_HEALTH_URL=http://hermes-gateway:8642
    networks:
      - rag_net
    depends_on:
      - gateway

networks:
  rag_net:
    driver: bridge